<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Training - Professional Check</title>
    <style>
        :root { --primary: #1db954; --bg: #121212; --card: #282828; --text: #fff; --error: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { max-width: 700px; width: 100%; text-align: center; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        textarea { width: 95%; padding: 15px; border-radius: 10px; border: none; background: #3e3e3e; color: white; font-size: 16px; margin-bottom: 15px; }
        button { background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.3s; margin: 5px; }
        
        .progress-container { width: 100%; height: 10px; background: #333; border-radius: 5px; margin: 20px 0; display: none; }
        #progress-bar { width: 0%; height: 100%; background: var(--primary); border-radius: 5px; transition: 0.5s; }

        .answer-zone { 
            min-height: 80px; background: #1a1a1a; border-bottom: 3px solid var(--primary); 
            margin: 20px 0; padding: 15px; border-radius: 8px; 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; 
        }
        #words-pool { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 10px; min-height: 50px; }

        .word-box { 
            padding: 10px 15px; border-radius: 8px; cursor: pointer; 
            font-weight: bold; color: #000; transition: 0.3s; white-space: nowrap; 
        }
        
        /* Cores de Validação */
        .correct-pos { border: 3px solid #00ff00 !important; transform: scale(1.05); }
        .wrong-pos { border: 3px solid var(--error) !important; animation: shake 0.3s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .hidden { display: none; }
        #status-msg { margin-top: 15px; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎵 Lyric Sorter Multi-Check</h1>

        <div id="setup-screen" class="card">
            <h3>Cole a letra da música</h3>
            <textarea id="lyricsInput" rows="10" placeholder="Cole aqui..."></textarea>
            <br>
            <button onclick="iniciarJogo()">Começar Treinamento</button>
        </div>

        <div id="game-screen" class="hidden">
            <div class="progress-container" id="p-container">
                <div id="progress-bar"></div>
            </div>
            
            <div class="card">
                <h3 id="step-title">Parte 1</h3>
                <div class="answer-zone" id="answer-zone"></div>
                <div id="words-pool"></div>
                
                <div id="status-msg"></div>
                <br>
                <button onclick="verificarTudo()">Verificar Resposta</button>
            </div>
        </div>
    </div>

    <script>
        let partesMusica = [];
        let indexAtual = 0;
        let fraseOriginalArray = [];
        const cores = ['#FFADAD', '#FFD6A5', '#FDFFB6', '#CAFFBF', '#9BF6FF', '#A0C4FF', '#BDB2FF'];

        function iniciarJogo() {
            const rawText = document.getElementById('lyricsInput').value.trim();
            if (!rawText) return;

            let blocosIniciais = rawText.split(/\n\s*\n/);
            partesMusica = [];

            blocosIniciais.forEach(bloco => {
                let linhas = bloco.split('\n').filter(l => l.trim() !== "");
                for (let i = 0; i < linhas.length; i += 2) {
                    partesMusica.push(linhas.slice(i, i + 2).join(' '));
                }
            });

            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('p-container').style.display = 'block';
            carregarParte();
        }

        function carregarParte() {
            const pool = document.getElementById('words-pool');
            const zone = document.getElementById('answer-zone');
            zone.innerHTML = "";
            pool.innerHTML = "";
            document.getElementById('status-msg').innerText = "";

            const total = partesMusica.length;
            document.getElementById('step-title').innerText = `Parte ${indexAtual + 1} de ${total}`;
            document.getElementById('progress-bar').style.width = `${(indexAtual / total) * 100}%`;

            fraseOriginalArray = partesMusica[indexAtual].split(/\s+/).filter(p => p.trim().length > 0);
            let embaralhadas = [...fraseOriginalArray].sort(() => Math.random() - 0.5);

            embaralhadas.forEach(p => {
                const span = document.createElement('span');
                span.className = 'word-box';
                span.innerText = p;
                span.style.backgroundColor = cores[Math.floor(Math.random() * cores.length)];
                
                span.onclick = () => {
                    if (span.parentElement === pool) zone.appendChild(span);
                    else pool.appendChild(span);
                    // Remove as cores de erro/acerto ao mexer na palavra
                    span.classList.remove('correct-pos', 'wrong-pos');
                };
                pool.appendChild(span);
            });
        }

        function verificarTudo() {
            const zone = document.getElementById('answer-zone');
            const status = document.getElementById('status-msg');
            const palavrasUsuario = Array.from(zone.children);

            if (palavrasUsuario.length < fraseOriginalArray.length) {
                status.innerText = "⚠️ Termine de montar a frase primeiro!";
                status.style.color = "orange";
                return;
            }

            let todosCorretos = true;

            palavrasUsuario.forEach((span, i) => {
                // Compara o texto da palavra na posição 'i' com a original
                if (span.innerText === fraseOriginalArray[i]) {
                    span.classList.remove('wrong-pos');
                    span.classList.add('correct-pos');
                } else {
                    span.classList.remove('correct-pos');
                    span.classList.add('wrong-pos');
                    todosCorretos = false;
                }
            });

            if (todosCorretos) {
                status.innerText = "✅ Perfeito! Tudo correto.";
                status.style.color = "var(--primary)";
                setTimeout(() => {
                    indexAtual++;
                    if (indexAtual < partesMusica.length) carregarParte();
                    else finalizar();
                }, 1500);
            } else {
                status.innerText = "❌ Algumas palavras estão fora de lugar.";
                status.style.color = "var(--error)";
            }
        }

        function finalizar() {
            document.getElementById('progress-bar').style.width = "100%";
            document.getElementById('game-screen').innerHTML = `
                <div class="card">
                    <h2>🏆 Treino Finalizado!</h2>
                    <p>Você concluiu todas as etapas.</p>
                    <button onclick="location.reload()">Reiniciar</button>
                </div>`;
        }
    </script>
</body>
</html>
