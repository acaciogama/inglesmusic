<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Lyric Sorter - Final</title>
    <style>
        :root { --primary: #1db954; --bg: #121212; --card: #282828; --text: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; }
        .tab-btn { padding: 10px 25px; border-radius: 20px; border: none; cursor: pointer; background: var(--card); color: white; font-weight: bold; }
        .tab-btn.active { background: var(--primary); }
        .container { max-width: 800px; width: 100%; text-align: center; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        input, textarea { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #3e3e3e; color: white; font-size: 16px; }
        button.action-btn { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; }
        
        /* Área do Vídeo */
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; margin: 20px 0; border: 2px solid #333; }
        
        /* Jogo */
        .word-box { display: inline-block; padding: 10px 15px; margin: 5px; border-radius: 6px; color: black; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .answer-zone { min-height: 60px; background: #1a1a1a; border-bottom: 3px solid var(--primary); margin: 15px 0; padding: 10px; border-radius: 8px; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('ordenacao')">1. Ordenação</button>
        <button class="tab-btn" onclick="switchTab('associacao')">2. Associação</button>
    </div>

    <div class="container">
        <!-- BASE 1 -->
        <div id="ordenacao">
            <div class="card">
                <h3>1. Vincular Vídeo</h3>
                <input type="text" id="videoUrl" placeholder="Cole o link do YouTube aqui (Ex: youtu.be/...)">
                <button class="action-btn" onclick="carregarVideo()">Carregar Música</button>
            </div>

            <div class="video-container hidden" id="playerWrapper">
                <div id="player"></div> <!-- API do YouTube injeta o vídeo aqui -->
            </div>

            <div class="card hidden" id="lyricInputArea">
                <h3>2. Letra da Música</h3>
                <textarea id="lyrics" rows="5" placeholder="Cole a letra em Inglês (separe estrofes pulando uma linha)"></textarea>
                <button class="action-btn" onclick="gerarJogo()">Começar Treino</button>
            </div>

            <div id="gameBoard"></div>
        </div>

        <!-- BASE 2 -->
        <div id="associacao" class="hidden">
            <div class="card"><h2>Em Breve: Associação de Palavras</h2></div>
        </div>
    </div>

    <!-- Script Oficial da API do YouTube -->
    <script src="https://youtube.com"></script>

    <script>
        let player;

        function switchTab(id) {
            document.getElementById('ordenacao').classList.toggle('hidden', id !== 'ordenacao');
            document.getElementById('associacao').classList.toggle('hidden', id !== 'associacao');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(id)));
        }

        function carregarVideo() {
            const url = document.getElementById('videoUrl').value;
            const videoId = url.includes('v=') ? url.split('v=')[1].substring(0, 11) : url.split('/').pop().substring(0, 11);

            if (videoId.length === 11) {
                if (player) {
                    player.loadVideoById(videoId);
                } else {
                    player = new YT.Player('player', {
                        height: '100%', width: '100%', videoId: videoId
                    });
                }
                document.getElementById('playerWrapper').classList.remove('hidden');
                document.getElementById('lyricInputArea').classList.remove('hidden');
            } else {
                alert("Link inválido!");
            }
        }

        function gerarJogo() {
            const text = document.getElementById('lyrics').value.trim();
            const board = document.getElementById('gameBoard');
            board.innerHTML = "";
            const cores = ['#FFADAD', '#FFD6A5', '#FDFFB6', '#CAFFBF', '#9BF6FF', '#A0C4FF', '#BDB2FF'];

            text.split(/\n\s*\n/).forEach((bloco, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<h4>Estrofe ${i+1}</h4>`;
                const zone = document.createElement('div');
                zone.className = 'answer-zone';
                const pool = document.createElement('div');

                let palavras = bloco.split(/\s+/);
                palavras.sort(() => Math.random() - 0.5);

                palavras.forEach(p => {
                    const span = document.createElement('span');
                    span.className = 'word-box';
                    span.innerText = p;
                    span.style.background = cores[Math.floor(Math.random() * cores.length)];
                    span.onclick = () => span.parentNode === pool ? zone.appendChild(span) : pool.appendChild(span);
                    pool.appendChild(span);
                });

                card.append(zone, pool);
                board.appendChild(card);
            });
        }
    </script>
</body>
</html>
