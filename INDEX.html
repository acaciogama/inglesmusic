<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Training Platform - Full Version</title>
    <style>
        :root {
            --primary: #1db954;
            --bg-dark: #121212;
            --card-bg: #282828;
            --text: #ffffff;
            --input-bg: #3e3e3e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Menu de Abas */
        .tabs-nav {
            display: flex;
            gap: 15px;
            margin: 30px 0;
            background: var(--card-bg);
            padding: 8px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .tab-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            background: transparent;
            color: #b3b3b3;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .container {
            max-width: 900px;
            width: 95%;
            text-align: center;
        }

        .content-section {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .content-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Buscador / Player */
        .video-box {
            width: 100%;
            height: 450px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #333;
            margin-bottom: 20px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        textarea {
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            border: 2px solid transparent;
            background: var(--input-bg);
            color: white;
            font-size: 16px;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .main-btn {
            padding: 15px 40px;
            cursor: pointer;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 35px;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }

        .main-btn:hover {
            transform: scale(1.05);
            background-color: #1ed760;
        }

        /* Área de Exercícios */
        .estrofe-container {
            background: #181818;
            padding: 25px;
            margin-top: 25px;
            border-radius: 15px;
            border: 1px solid #333;
            text-align: center;
        }

        .answer-zone {
            min-height: 70px;
            background: #222;
            border-bottom: 3px solid var(--primary);
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        .word-box {
            display: inline-block;
            padding: 12px 18px;
            margin: 5px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: #000;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: 0.2s;
            user-select: none;
        }

        .word-box:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        h2 { color: var(--primary); margin-bottom: 20px; }
        .hint { color: #888; font-size: 0.9em; margin-top: 5px; }

    </style>
</head>
<body>

    <div class="tabs-nav">
        <button class="tab-btn active" onclick="switchTab('ordenacao')">1. Ordenação</button>
        <button class="tab-btn" onclick="switchTab('associacao')">2. Associação</button>
    </div>

    <div class="container">
        
        <!-- SEÇÃO 1: ORDENAÇÃO -->
        <div id="ordenacao" class="content-section active">
            <h2>🎵 Treino de Ordenação</h2>
            
            <div class="card">
                <div class="video-box">
                    <!-- O buscador integrado que funciona em REDE -->
                    <iframe id="mainIframe" src="https://youtube.com" 
                            allow="autoplay; encrypted-media" allowfullscreen></iframe>
                </div>
                <p class="hint">Use a busca interna do YouTube acima para escolher sua música.</p>
            </div>

            <div class="card">
                <h3>Cole a letra em Inglês abaixo</h3>
                <textarea id="lyricsText" rows="6" placeholder="Exemplo:&#10;I see a red door&#10;And I want it painted black&#10;&#10;No colors anymore&#10;I want them to turn black"></textarea>
                <button class="main-btn" onclick="gerarExercicio()">Gerar Desafio por Estrofe</button>
            </div>

            <div id="exerciseBoard"></div>
        </div>

        <!-- SEÇÃO 2: ASSOCIAÇÃO -->
        <div id="associacao" class="content-section">
            <h2>🔗 Associação Inglês/Português</h2>
            <div class="card">
                <p>Nesta base, você poderá associar termos da música com suas traduções.</p>
                <div class="video-box">
                    <div style="padding-top: 150px; color: #666;">
                        <p>O vídeo escolhido na aba 1 também aparecerá aqui em breve.</p>
                    </div>
                </div>
                <button class="main-btn">Em breve: Criar Colunas</button>
            </div>
        </div>

    </div>

    <script>
        // Troca de Abas
        function switchTab(tabId) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // Lógica de Geração dos Exercícios
        function gerarExercicio() {
            const text = document.getElementById('lyricsText').value.trim();
            if (!text) {
                alert("Por favor, cole a letra da música para começar!");
                return;
            }

            const board = document.getElementById('exerciseBoard');
            board.innerHTML = "<h2>Desafio Gerado!</h2>"; // Limpa e adiciona título

            const cores = ['#FFADAD', '#FFD6A5', '#FDFFB6', '#CAFFBF', '#9BF6FF', '#A0C4FF', '#BDB2FF', '#FFC6FF'];
            
            // Divide o texto por estrofes (quando o usuário pula uma linha)
            const estrofes = text.split(/\n\s*\n/);

            estrofes.forEach((textoEstrofe, index) => {
                const estrofeWrapper = document.createElement('div');
                estrofeWrapper.className = 'estrofe-container';
                estrofeWrapper.innerHTML = `<h3>Estrofe ${index + 1}</h3>`;

                const answerZone = document.createElement('div');
                answerZone.className = 'answer-zone';
                answerZone.innerHTML = "<small style='width:100%; color:#555; margin-bottom:10px;'>Clique nas palavras abaixo para organizar:</small>";

                const poolZone = document.createElement('div');

                // Quebra em palavras, remove espaços extras
                let palavras = textoEstrofe.split(/\s+/).filter(p => p.length > 0);
                
                // Embaralha
                palavras.sort(() => Math.random() - 0.5);

                palavras.forEach(palavra => {
                    const span = document.createElement('span');
                    span.className = 'word-box';
                    span.innerText = palavra;
                    
                    // Cor aleatória do array
                    span.style.backgroundColor = cores[Math.floor(Math.random() * cores.length)];
                    
                    // Lógica de Clique (Mover entre as zonas)
                    span.onclick = function() {
                        if (span.parentElement === poolZone) {
                            answerZone.appendChild(span);
                        } else {
                            poolZone.appendChild(span);
                        }
                    };

                    poolZone.appendChild(span);
                });

                estrofeWrapper.appendChild(answerZone);
                estrofeWrapper.appendChild(poolZone);
                board.appendChild(estrofeWrapper);
            });

            // Rola suavemente para o primeiro exercício
            window.scrollTo({
                top: board.offsetTop - 50,
                behavior: 'smooth'
            });
        }
    </script>
</body>
</html>
